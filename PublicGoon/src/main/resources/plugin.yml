name: PublicGoon
version: '1.0'
main: org.please.publicGoon.PublicGoon
api-version: '1.21'
commands:
  queue:
    description: Open the PvP queue selector
    usage: /queue [leave]
    aliases: [q]
  leave:
    description: Leave all active queues
    usage: /leave
  lobby:
    description: Teleport to the lobby
    usage: /lobby
    aliases: [hub]
  setlobby:
    description: Set the lobby spawn to your current location
    usage: /setlobby
    permission: publicgoon.admin
  spectate:
    description: Enter spectator mode to watch a player
    usage: /spectate <player>
  profile:
    description: View a player's profile
    usage: /profile [player]
  friend:
    description: Manage friends
    usage: /friend <add/remove/list/requests/accept/deny> [player]
    aliases: [f]
softdepend: [PlaceholderAPI, LuckPerms]
permissions:
  publicgoon.admin:
    description: Allows configuring the PublicGoon plugin
    default: op
    children:
      publicgoon.lobby.build: true
  publicgoon.lobby.build:
    description: Allows building, breaking and interacting with blocks in the lobby world
    default: op
